<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rizalwear | Crafted for Comfort</title>
    <meta name="description" content="Premium, breathable summer clothing for kids aged 4-13.">
    <meta name="theme-color" content="#f4f7f6">
    <link rel="canonical" href="https://yourdomain.com/">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yourdomain.com/">
    <meta property="og:title" id="og-title" content="Rizalwear | Crafted for Comfort">
    <meta property="og:description" id="og-desc" content="Premium kids clothing.">
    <meta property="og:image" id="og-img" content="">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Config & Scripts -->
    <script src="config/config.js"></script>
    <script src="js/tracking.js"></script>
</head>
<body>
    <!-- Announcement Bar -->
    <div class="announcement-bar" id="announcement-bar">
        Free Delivery on orders over 3 items!
    </div>

    <!-- Hero Section -->
    <header class="hero">
        <h1 id="brand-name" class="brand-title"></h1>
        <p id="brand-tagline" class="brand-tagline"></p>
    </header>

    <!-- Product Section -->
    <section class="product-showcase">
        <div class="gallery" id="product-gallery"></div>
        <div class="product-info">
            <h2 id="product-name"></h2>
            <div class="pricing">
                <span id="offer-price" class="offer-price"></span>
                <span id="regular-price" class="regular-price"></span>
            </div>
            <p id="product-desc" class="desc"></p>
            
            <div class="features">
                <h3>Why Choose Us?</h3>
                <ul>
                    <li>🌱 Premium Breathable Fabric</li>
                    <li>✨ Soft on Kids' Skin</li>
                    <li>🎨 Beautiful Summer Colors</li>
                </ul>
            </div>
        </div>
    </section>

    <!-- Order Section (The Core Engine) -->
    <section class="order-section" id="order-section">
        <div class="size-chart-trigger" onclick="openSizeChart()">📏 View Size Chart</div>
        
        <form id="checkout-form" class="checkout-form">
            <div id="cart-items">
                <!-- Cart rows will be injected here by JS -->
            </div>
            <button type="button" class="btn-secondary" onclick="addCartRow()">+ Add Another Product</button>

            <div class="live-cart-summary">
                <div class="summary-row"><span>Subtotal:</span> <span id="summary-subtotal">৳0</span></div>
                <div class="summary-row"><span>Delivery:</span> <span id="summary-delivery">৳0</span></div>
                <div class="summary-row grand-total"><span>Grand Total:</span> <span id="summary-total">৳0</span></div>
            </div>

            <div class="customer-details">
                <h3>Delivery Information</h3>
                <input type="text" id="cust-name" placeholder="Full Name" required>
                <input type="tel" id="cust-phone" placeholder="Phone Number (11 digits)" pattern="[0-9]{11}" required>
                
                <select id="cust-district" required onchange="calculateCart()">
                    <option value="" disabled selected>Select District</option>
                    <option value="Dhaka">Dhaka City</option>
                    <option value="Outside">Outside Dhaka</option>
                </select>
                
                <input type="text" id="cust-area" placeholder="Area / Thana" required>
                <textarea id="cust-address" placeholder="Full Address" required></textarea>
                <textarea id="cust-note" placeholder="Any special instructions? (Optional)"></textarea>
                
                <div class="payment-method">
                    <label><input type="radio" checked disabled> Cash on Delivery (COD)</label>
                </div>
            </div>

            <button type="submit" class="btn-primary sticky-cta" id="submit-btn">Place Order - <span id="btn-total">৳0</span></button>
        </form>
    </section>

    <!-- Size Chart Modal -->
    <div id="size-chart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeSizeChart()">&times;</span>
            <h2>Size Chart</h2>
            <p>Pinch to zoom</p>
            <img src="assets/images/size-chart.webp" alt="Size Chart" class="zoomable-img">
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
