<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lirrizal | Kids Premium Fotua</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="config/config.js"></script>
    <script src="js/tracking.js"></script>
</head>
<body>
    <header class="hero">
        <h1 id="brand-name"></h1>
        <p id="brand-tagline"></p>
    </header>

    <section class="product-showcase">
        <!-- Auto Scrolling Gallery -->
        <div class="gallery-container">
            <button class="nav-arrow left-arrow" onclick="prevSlide()">&#10094;</button>
            <img id="main-product-image" src="" alt="Product Image">
            <button class="nav-arrow right-arrow" onclick="nextSlide()">&#10095;</button>
            <p id="active-color-name" class="color-label"></p>
        </div>

        <!-- Size Chart & Features -->
        <div class="product-details-extra">
            <img id="size-chart-img" src="" alt="Size Chart" class="inline-size-chart">
            <ul id="product-features" class="feature-list"></ul>
        </div>

        <div class="product-info">
            <h2 id="product-name"></h2>
            <div class="pricing">
                <span id="offer-price" class="offer-price"></span>
                <span id="regular-price" class="regular-price"></span>
            </div>
            
            <!-- Selection Engine -->
            <div class="selection-engine">
                <div class="color-selection">
                    <h4>রঙ নির্বাচন করুন: <span id="selected-color-text"></span></h4>
                    <div class="color-thumbnails" id="color-thumbnails"></div>
                </div>

                <div class="size-selection">
                    <h4>সাইজ (বছর) নির্বাচন করুন:</h4>
                    <div class="size-buttons" id="size-buttons"></div>
                    <div class="measurement-display" id="measurement-display" style="display: none;"></div>
                </div>

                <div class="qty-selection">
                    <h4>পরিমাণ:</h4>
                    <div class="qty-control">
                        <button type="button" onclick="changeQty(-1)">-</button>
                        <input type="number" id="item-qty" value="1" min="1" readonly>
                        <button type="button" onclick="changeQty(1)">+</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Order Form -->
    <section class="order-section" id="order-section">
        <form id="checkout-form" class="checkout-form">
            <div class="live-cart-summary">
                <div class="summary-row"><span>সাবটোটাল:</span> <span id="summary-subtotal">৳০</span></div>
                <div class="summary-row"><span>ডেলিভারি চার্জ:</span> <span id="summary-delivery">৳০</span></div>
                <div class="summary-row grand-total"><span>সর্বমোট:</span> <span id="summary-total">৳০</span></div>
            </div>

            <div class="customer-details">
                <h3>ডেলিভারি তথ্য</h3>
                <input type="text" id="cust-name" placeholder="আপনার সম্পূর্ণ নাম" required>
                <input type="tel" id="cust-phone" placeholder="মোবাইল নাম্বার (১১ ডিজিট)" pattern="[0-9]{11}" required>
                
                <select id="cust-district" required onchange="calculateTotal()">
                    <option value="" disabled selected>ডেলিভারি এলাকা নির্বাচন করুন</option>
                    <option value="Dhaka">ঢাকার ভিতরে (৬০ টাকা)</option>
                    <option value="Outside">ঢাকার বাইরে (৯০ টাকা)</option>
                </select>
                
                <textarea id="cust-address" placeholder="সম্পূর্ণ ঠিকানা" required></textarea>
            </div>

            <button type="submit" class="btn-primary sticky-cta" id="submit-btn">অর্ডার কনফার্ম করুন - <span id="btn-total">৳০</span></button>
        </form>
    </section>

    <footer class="site-footer">
        <p id="footer-address"></p>
        <p>WhatsApp: <span id="footer-wa"></span></p>
        <p><a id="footer-fb" href="" target="_blank">Facebook Page</a> | <a id="footer-web" href="" target="_blank">Website</a></p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
